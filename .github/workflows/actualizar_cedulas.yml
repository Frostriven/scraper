name: Actualizar base de cédulas médicas

on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright
        run: |
          pip install playwright==1.44.0
          python -m playwright install chromium
          sudo apt-get install -y \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxcb1 \
            libxkbcommon0 \
            libx11-6 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Correr scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py

      - name: Notificar resultado
        if: always()
        run: echo "Scraping completado con status ${{ job.status }}"
